{% set name = "aisim" %}
{% set version = "2.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aisim-{{ version }}.tar.gz
  sha256: 655cf987a532650a7611a8b432b317c8275824517bd578a3aedf5a3b485cb761

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.4
  run:
    - matplotlib-base
    - numpy
    - python >=3.4
    - scipy

test:
  imports:
    - aisim
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/bleykauf/aisim
  summary: Simulations for light-pulse atom interferometry
  license: GPL-3.0-or-later
  license_file: LICENSE
  doc_url: https://aisim.readthedocs.io/
  dev_url: https://github.com/bleykauf/aisim

extra:
  recipe-maintainers:
    - bleykauf
